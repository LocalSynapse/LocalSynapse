name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore LocalSynapse.v2.sln
      - name: Build
        run: dotnet build LocalSynapse.v2.sln -c Release --no-restore
      - name: Test
        run: dotnet test LocalSynapse.v2.sln -c Release --no-restore
