name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore LocalSynapse.v2.sln

      - name: Build Release
        run: dotnet build LocalSynapse.v2.sln -c Release --no-restore

      - name: Publish win-x64
        run: |
          dotnet publish src/LocalSynapse.UI/LocalSynapse.UI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ./publish/win-x64

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path ./publish/win-x64/* `
            -DestinationPath ./publish/LocalSynapse-${{ github.ref_name }}-win-x64.zip

      - name: Generate SHA256 checksum
        run: |
          $hash = (Get-FileHash ./publish/LocalSynapse-${{ github.ref_name }}-win-x64.zip -Algorithm SHA256).Hash
          "$hash  LocalSynapse-${{ github.ref_name }}-win-x64.zip" | Out-File ./publish/SHA256SUMS.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalSynapse-${{ github.ref_name }}-unsigned
          path: |
            ./publish/LocalSynapse-${{ github.ref_name }}-win-x64.zip
            ./publish/SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish/LocalSynapse-${{ github.ref_name }}-win-x64.zip
            ./publish/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
