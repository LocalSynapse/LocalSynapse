name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $isTag = "${{ github.ref }}".StartsWith("refs/tags/")
          if ($isTag -and $tag -notmatch '^v\d+\.\d+\.\d+(-[a-z0-9.]+)?$') {
              Write-Error "Invalid tag format: $tag"
              exit 1
          }
          $ver = $tag -replace '^v', ''
          if (-not $ver) { $ver = "0.0.0" }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver, Tag: $tag"
      - name: Restore dependencies
        run: dotnet restore LocalSynapse.v2.sln
      - name: Run tests
        run: dotnet test LocalSynapse.v2.sln -c Release --no-restore
      - name: Build Release
        run: dotnet build LocalSynapse.v2.sln -c Release --no-restore
      - name: Publish win-x64
        run: |
          dotnet publish src/LocalSynapse.UI/LocalSynapse.UI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o ./publish/win-x64
      - name: Build Installer (Inno Setup)
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.VERSION }} installer\LocalSynapse.iss
      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $setupExe = "publish\installer\LocalSynapse-v${{ steps.version.outputs.VERSION }}-Windows-Setup.exe"
          $lines = @()
          if (Test-Path $setupExe) {
            $hash = (Get-FileHash $setupExe -Algorithm SHA256).Hash
            $lines += "$hash  $(Split-Path $setupExe -Leaf)"
          }
          $lines | Out-File publish\installer\SHA256SUMS.txt
          Get-Content publish\installer\SHA256SUMS.txt
      - name: Flatten Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish/artifacts
          Copy-Item "publish/installer/LocalSynapse-v${{ steps.version.outputs.VERSION }}-Windows-Setup.exe" "publish/artifacts/" -ErrorAction SilentlyContinue
          Copy-Item "publish/installer/SHA256SUMS.txt" "publish/artifacts/" -ErrorAction SilentlyContinue
          Get-ChildItem publish/artifacts/
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: publish/artifacts/

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            arch_label: AppleSilicon
          - rid: osx-x64
            arch_label: Intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/* && ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?$ ]]; then
              echo "::error::Invalid tag format: $TAG"
              exit 1
          fi
          VER="${TAG#v}"
          if [ -z "$VER" ]; then VER="0.0.0"; fi
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VER, Tag: $TAG"
      - name: Restore dependencies
        run: dotnet restore LocalSynapse.v2.sln
      - name: Build Release
        run: dotnet build LocalSynapse.v2.sln -c Release --no-restore
      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish src/LocalSynapse.UI/LocalSynapse.UI.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o ./publish/${{ matrix.rid }}
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Generate macOS icon
        run: |
          chmod +x installer/macos/create-icns.sh
          installer/macos/create-icns.sh
      - name: Create .app bundle and .dmg
        run: |
          chmod +x installer/macos/create-app-bundle.sh
          installer/macos/create-app-bundle.sh \
            "${{ steps.version.outputs.VERSION }}" \
            "${{ matrix.rid }}" \
            "./publish/${{ matrix.rid }}"
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ matrix.arch_label }}
          path: |
            publish/macos/LocalSynapse-v${{ steps.version.outputs.VERSION }}-macOS-${{ matrix.arch_label }}.dmg
            publish/macos/SHA256SUMS-macOS.txt

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows
      - name: Download macOS Apple Silicon artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-AppleSilicon
          path: artifacts/macos-arm64
      - name: Download macOS Intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-Intel
          path: artifacts/macos-x64
      - name: List all artifacts
        run: find artifacts -type f | sort
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/LocalSynapse-v${{ steps.version.outputs.VERSION }}-Windows-Setup.exe
            artifacts/windows/SHA256SUMS.txt
            artifacts/macos-arm64/LocalSynapse-v${{ steps.version.outputs.VERSION }}-macOS-AppleSilicon.dmg
            artifacts/macos-arm64/SHA256SUMS-macOS.txt
            artifacts/macos-x64/LocalSynapse-v${{ steps.version.outputs.VERSION }}-macOS-Intel.dmg
          generate_release_notes: true
          append_body: true
          draft: false
          prerelease: false
          body: |

            ---

            ### macOS — First launch

            macOS may show a security warning because this app is not signed with an Apple certificate. To open it:

            **Option A (recommended):** Open Terminal and run:
            ```
            xattr -cr /Applications/LocalSynapse.app
            ```
            Then double-click the app to launch. Works on all macOS versions.

            **Option B:** Use System Settings
            1. Double-click the app → click "Done" when blocked
            2. Open System Settings → Privacy & Security
            3. Scroll down, click "Open Anyway"

            You only need to do this once. macOS 15 Sequoia removed the older Control+click bypass.
      - name: Upload fixed-name assets (latest download URLs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts
          cp windows/LocalSynapse-v*-Windows-Setup.exe LocalSynapse-Windows-Setup.exe 2>/dev/null && \
            gh release upload ${{ github.ref_name }} LocalSynapse-Windows-Setup.exe --clobber || true
          cp macos-arm64/LocalSynapse-v*-macOS-AppleSilicon.dmg LocalSynapse-macOS-AppleSilicon.dmg 2>/dev/null && \
            gh release upload ${{ github.ref_name }} LocalSynapse-macOS-AppleSilicon.dmg --clobber || true
          cp macos-x64/LocalSynapse-v*-macOS-Intel.dmg LocalSynapse-macOS-Intel.dmg 2>/dev/null && \
            gh release upload ${{ github.ref_name }} LocalSynapse-macOS-Intel.dmg --clobber || true
