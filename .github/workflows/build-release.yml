name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          if (-not $ver) { $ver = "0.0.0" }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver, Tag: $tag"

      - name: Restore dependencies
        run: dotnet restore LocalSynapse.v2.sln

      - name: Build Release
        run: dotnet build LocalSynapse.v2.sln -c Release --no-restore

      - name: Publish win-x64
        run: |
          dotnet publish src/LocalSynapse.UI/LocalSynapse.UI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o ./publish/win-x64

      - name: Build Installer (Inno Setup)
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.VERSION }} installer\LocalSynapse.iss

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $setupExe = "publish\installer\LocalSynapse-v${{ steps.version.outputs.VERSION }}-Setup.exe"
          $hash = (Get-FileHash $setupExe -Algorithm SHA256).Hash
          "$hash  $(Split-Path $setupExe -Leaf)" | Out-File publish\installer\SHA256SUMS.txt
          Write-Host "SHA256: $hash"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LocalSynapse-${{ steps.version.outputs.TAG }}
          path: |
            publish/installer/LocalSynapse-v${{ steps.version.outputs.VERSION }}-Setup.exe
            publish/installer/SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/installer/LocalSynapse-v${{ steps.version.outputs.VERSION }}-Setup.exe
            publish/installer/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
